name: MicioStudio
options:
  bundleIdPrefix: dev.miciodev
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.miciodev.MicioStudio
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"

targets:
  MicioStudio:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Config.swift
      - path: Generated            # UniFFI output; produced by scripts/build-core.sh before `xcodegen generate`
    settings:
      base:
        PRODUCT_NAME: MicioStudio
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MicioStudio.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        # macOS 26 sandboxes script phases by default; our pre-build script must
        # read core/target and write app/Generated, so disable it.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Stable self-signed identity (created in the login keychain). Unlike ad-hoc
        # "-" signing, the code hash-independent identity keeps TCC grants (Screen
        # Recording, Accessibility) valid across rebuilds — otherwise every rebuild
        # invalidates them and macOS keeps re-prompting. See README (Dev signing).
        CODE_SIGN_IDENTITY: "MicioDev Local Signing"
        CODE_SIGN_STYLE: Manual
        # Xcode 16+ splits Debug builds into a stub + debug.dylib linked with
        # -undefined dynamic_lookup, which lets the Rust static lib's symbols stay
        # UNDEFINED at link time (build passes) then crash at runtime. Disable it so
        # Debug links libmicio_core.a into the executable like a normal build.
        ENABLE_DEBUG_DYLIB: NO
        # Link the Rust static lib. -force_load pulls ALL archive members regardless
        # of link order — plain -lmicio_core leaves the FFI symbols undefined because
        # the archive is scanned before the Swift objects reference them. Two array
        # elements keep the space in the path within a single argv entry.
        OTHER_LDFLAGS:
          - -force_load
          - $(SRCROOT)/../core/target/release/libmicio_core.a
        # Make the generated `import micio_coreFFI` resolvable by explicitly
        # loading the generated Clang modulemap (survives regeneration; no edits
        # to generated files).
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/Generated
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/Generated/MicioCoreFFI.modulemap
    preBuildScripts:
      - path: ../scripts/build-core.sh
        name: "Build Rust core + UniFFI bindings"
        basedOnDependencyAnalysis: false
